# Configuration yaml
spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users/**
        - id: default
          uri: http://httpbin.org
          predicates:
            - Path=/**


###
# Actuator health check monitoring at /actuator/health
###
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO