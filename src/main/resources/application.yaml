server:
  port: 8500
  shutdown: graceful

spring:
  application:
    name: loan-origination-service
  profiles:
    active: local
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  cloud:
    loadbalancer:
      cache:
        ttl: 30s
        capacity: 256
    gateway:
      server:
        webflux:
          routes:
            - id: iam-service-route
              uri: lb://IAM-SERVICE
              predicates:
                - Path=/api/v1/auth/**,/api/v1/admin/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 10
                    key-resolver: "#{@ipKeyResolver}"
                - name: CircuitBreaker
                  args:
                    name: iamServiceCircuitBreaker
                    fallbackUri: forward:/fallback/iam
            - id: notification-service-route
              uri: lb://NOTIFICATION-SERVICE
              predicates:
                - Path=/api/v1/template/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 5
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"
                - name: CircuitBreaker
                  args:
                    name: notificationServiceCircuitBreaker
                    fallbackUri: forward:/fallback/notification
            - id: docs-service-route
              uri: lb://DOCS-SERVICE
              predicates:
                - Path=/api/v1/documents/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 20
                    redis-rate-limiter.burstCapacity: 40
                    key-resolver: "#{@ipKeyResolver}"
                - name: CircuitBreaker
                  args:
                    name: docsServiceCircuitBreaker
                    fallbackUri: forward:/fallback/docs
            - id: default
              uri: http://httpbin.org
              predicates:
                - Path=/**

filters:
  logging:
    header: X-Correlation-Id
    start-time: startTime
  jwt:
    header: Authorization
    excluded:
      - /api/v1/auth/**

resilience4j:
  circuitbreaker:
    instances:
      docsServiceCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      iamServiceCircuitBreaker:
        slidingWindowSize: 6
        failureRateThreshold: 75
        waitDurationInOpenState: 4s
      notificationServiceCircuitBreaker:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
  timelimiter:
    instances:
      docsServiceCircuitBreaker:
        timeoutDuration: 3s
      iamServiceCircuitBreaker:
        timeoutDuration: 4s
      notificationServiceCircuitBreaker:
        timeoutDuration: 4s

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, gateway, circuitbreakers
  endpoint:
    health:
      show-details: always

info:
  app:
    name: ${spring.application.name}
    description: "API Gateway for the Loan Origination System"
    version: "1.0.0"

logging:
  level:
    root: INFO

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

jwt:
  signing_key: ${JWT_KEY}
